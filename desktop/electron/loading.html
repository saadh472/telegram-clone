<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starting Telegram Web Desktop</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, "Segoe UI", Arial, sans-serif; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0e1621;
      color: #f4f8fb;
    }
    main {
      width: min(420px, calc(100vw - 32px));
      text-align: center;
      display: grid;
      gap: 14px;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 4px;
      border-radius: 50%;
      background: #3390ec;
      display: grid;
      place-items: center;
      box-shadow: 0 18px 45px rgba(51, 144, 236, 0.32);
    }
    .logo svg { width: 42px; height: 42px; color: white; }
    h1 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.3;
      font-weight: 650;
    }
    p {
      margin: 0;
      color: #9fb2c3;
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .bar {
      width: 100%;
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 6px;
    }
    .bar::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: #3390ec;
      animation: loading 1.1s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(260%); }
    }
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M2.01 12 22 3 18.2 21 12 16.4 8.2 20l.8-6.2L2.01 12Zm7.7 1.2 1.4 4.2.3-3.1 6.3-7.1-8 6Z"/></svg>
    </div>
    <h1>Starting Telegram Web Desktop</h1>
    <p>Preparing the local backend and checking SQL Server.</p>
    <div class="bar" aria-hidden="true"></div>
  </main>
</body>
</html>
