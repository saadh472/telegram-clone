name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-and-backend-checks:
    name: Frontend and backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Check frontend modules
        run: npm --prefix frontend run check

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile backend Python
        run: python -m compileall -q backend

