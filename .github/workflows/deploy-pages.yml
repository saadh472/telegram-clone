name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Check frontend modules
        run: npm --prefix frontend run check

      - name: Inject deployed API URL
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          node -e "const fs=require('fs'); const api=(process.env.API_BASE_URL||'').trim().replace(/\/+$/, ''); if(!api){console.error('Set repository variable API_BASE_URL to your backend API URL, for example https://telegram-clone-api.onrender.com/api'); process.exit(1);} fs.writeFileSync('frontend/js/deploy-config.js', 'window.TELEGRAM_API_BASE = ' + JSON.stringify(api) + ';\n');"
          touch frontend/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

  deploy:
    name: Deploy static frontend
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
